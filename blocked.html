<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocked — Website Blocker</title>
  <style>
    :root {
      --bg-start: #e8eaf6;
      --bg-end:   #fce4ec;
      --surface:  rgba(255, 255, 255, 0.72);
      --border:   rgba(255, 255, 255, 0.9);
      --text:     #1a1a2e;
      --muted:    #5c6582;
      --accent:   #5c6bc0;
      --chip-bg:  rgba(92, 107, 192, 0.12);
      --radius:   16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Georgia, serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 48px 48px 40px;
      max-width: 640px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.10), 0 2px 8px rgba(0,0,0,0.06);
    }

    /* ── Shield icon ── */
    .shield {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    /* ── Quote ── */
    .quote-text {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 400;
      color: var(--text);
      line-height: 1.55;
      font-style: italic;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }

    .quote-text::before { content: '\201C'; }
    .quote-text::after  { content: '\201D'; }

    .quote-author {
      font-size: 14px;
      color: var(--muted);
      font-style: normal;
      font-weight: 500;
      margin-bottom: 32px;
      letter-spacing: 0.02em;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(92,107,192,0.25), transparent);
      margin: 0 auto 28px;
      width: 80%;
    }

    /* ── Blocked info ── */
    .blocked-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .blocked-domain {
      display: inline-block;
      background: var(--chip-bg);
      color: var(--accent);
      border: 1px solid rgba(92,107,192,0.25);
      border-radius: 999px;
      padding: 5px 18px;
      font-size: 14px;
      font-weight: 600;
      font-style: normal;
      margin-bottom: 24px;
      letter-spacing: 0.01em;
    }

    /* ── Pomodoro countdown ── */
    #pomo-section {
      display: none;
      margin-top: 4px;
    }

    .pomo-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .pomo-timer-text {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
    }

    .pomo-phase-text {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 36px;
      font-size: 11px;
      color: var(--muted);
      opacity: 0.65;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="shield">🛡️</span>

    <p class="quote-text" id="quote-text">Loading…</p>
    <p class="quote-author" id="quote-author"></p>

    <div class="divider"></div>

    <p class="blocked-label">You tried to visit</p>
    <span class="blocked-domain" id="blocked-domain">this site</span>

    <div id="pomo-section">
      <p class="pomo-label">Break in</p>
      <div class="pomo-timer-text" id="pomo-countdown">--:--</div>
      <div class="pomo-phase-text" id="pomo-phase-text"></div>
    </div>

    <p class="footer">Website Blocker — stay focused, one session at a time.</p>
  </div>

  <script src="quotes.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
